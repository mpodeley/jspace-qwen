site_name: Operator–Operand Factorization in LLMs
site_url: https://mpodeley.github.io/jspace-qwen/
site_description: >-
  Relational operations factorize from their operands in LLMs: causal interventions
  reveal transferable operator directions — replicated on Qwen3 (1.7B/8B) and
  Gemma-2-9B — while arithmetic and logic remain entangled.
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle: {icon: material/weather-night, name: Dark mode}
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle: {icon: material/weather-sunny, name: Light mode}
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex: {generic: true}
  - tables
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          nav_translations:
            Main finding: Hallazgo principal
            Explained simply: Explicado fácil
            Paper: Paper
            Interactive explorer: Explorador interactivo
            Evidence & controls: Evidencia y controles
            How to reproduce: Cómo reproducir
            J-space replication (archive): Réplica J-space (archivo)
            Method (J-lens & J-space): Método (J-lens y J-space)
            Results — scale: Resultados — escala
            Results — causal: Resultados — causal
            Setup (AMD/ROCm): Setup (AMD/ROCm)
            Working log (findings): Bitácora (findings)
nav:
  - Main finding: index.md
  - Explained simply: explained.md
  - Paper: paper.md
  - Interactive explorer: explorer.md
  - Evidence & controls: robustness.md
  - How to reproduce: reproduce.md
  - J-space replication (archive):
      - Method (J-lens & J-space): method.md
      - Results — scale: results-scale.md
      - Results — causal: results-causal.md
      - Setup (AMD/ROCm): setup.md
  - Working log (findings): findings.md
